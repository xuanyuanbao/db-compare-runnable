# Run CompareApplication directly in your IDE with no command-line arguments.
# This default file uses the built-in snapshot demo data so it works out of the box.
#
# When you want to connect to real databases, replace these SNAPSHOT entries with JDBC settings.

source.count=2
source.1.name=AS400_1
source.1.type=SNAPSHOT
source.1.snapshotFile=examples/demo/source_as400_1.csv

source.2.name=DB2_1
source.2.type=SNAPSHOT
source.2.snapshotFile=examples/demo/source_db2_1.csv

target.name=GAUSS
target.type=SNAPSHOT
target.snapshotFile=examples/demo/gauss_target.csv

mapping.count=2
mapping.1.sourceDatabaseName=AS400_1
mapping.1.targetSchemaName=T_AS400_1
mapping.2.sourceDatabaseName=DB2_1
mapping.2.targetSchemaName=T_DB2_1

compare.options.compareNullable=true
compare.options.compareDefaultValue=true
compare.options.compareLength=true
compare.options.sourceLoadThreads=2

output.csvPath=build/reports/default-compare-report.csv
output.summaryPath=build/reports/default-compare-summary.txt
