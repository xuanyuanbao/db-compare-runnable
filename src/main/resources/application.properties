# Spring Boot automatically loads this file from the classpath.
# The default config below uses snapshot demo data so the app can start in the IDE immediately.

dbcompare.sources[0].source-name=AS400_1
dbcompare.sources[0].type=SNAPSHOT
dbcompare.sources[0].snapshot-file=examples/demo/source_as400_1.csv

dbcompare.sources[1].source-name=DB2_1
dbcompare.sources[1].type=SNAPSHOT
dbcompare.sources[1].snapshot-file=examples/demo/source_db2_1.csv

dbcompare.target.source-name=GAUSS
dbcompare.target.type=SNAPSHOT
dbcompare.target.snapshot-file=examples/demo/gauss_target.csv

dbcompare.mappings[0].source-database-name=AS400_1
dbcompare.mappings[0].target-schema-name=T_AS400_1
dbcompare.mappings[1].source-database-name=DB2_1
dbcompare.mappings[1].target-schema-name=T_DB2_1

dbcompare.options.compare-nullable=true
dbcompare.options.compare-default-value=true
dbcompare.options.compare-length=true
dbcompare.options.source-load-threads=2

dbcompare.output.csv-path=build/reports/default-compare-report.csv
dbcompare.output.summary-path=build/reports/default-compare-summary.txt
