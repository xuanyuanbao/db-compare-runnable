# Real JDBC example. Add the vendor driver jar to the runtime classpath yourself.
# AS400 example driver: com.ibm.as400.access.AS400JDBCDriver
# DB2 example driver: com.ibm.db2.jcc.DB2Driver
# Gauss/PostgreSQL example driver: org.postgresql.Driver

source.count=2
source.1.name=AS400_A
source.1.type=AS400
source.1.driverClassName=com.ibm.as400.access.AS400JDBCDriver
source.1.jdbcUrl=jdbc:as400://10.0.0.10;naming=sql;errors=full
source.1.username=demo
source.1.password=demo
source.1.includeSchemas=LEGACYA

source.2.name=DB2_B
source.2.type=DB2
source.2.driverClassName=com.ibm.db2.jcc.DB2Driver
source.2.jdbcUrl=jdbc:db2://10.0.0.20:50000/LEGACYDB
source.2.username=demo
source.2.password=demo
source.2.includeSchemas=LEGACYB

target.name=GAUSS
target.type=GAUSS
target.driverClassName=org.postgresql.Driver
target.jdbcUrl=jdbc:postgresql://10.0.0.30:5432/gaussdb
target.username=demo
target.password=demo

mapping.count=2
mapping.1.sourceDatabaseName=AS400_A
mapping.1.targetSchemaName=T_AS400_A
mapping.2.sourceDatabaseName=DB2_B
mapping.2.targetSchemaName=T_DB2_B

# Optional table-level overrides
# tableMapping.count=1
# tableMapping.1.sourceDatabaseName=AS400_A
# tableMapping.1.sourceSchemaName=LEGACYA
# tableMapping.1.sourceTableName=OLD_TABLE
# tableMapping.1.targetSchemaName=T_AS400_A
# tableMapping.1.targetTableName=NEW_TABLE

compare.options.compareNullable=true
compare.options.compareDefaultValue=true
compare.options.compareLength=true
compare.options.sourceLoadThreads=4

output.csvPath=build/reports/jdbc-compare-report.csv
output.summaryPath=build/reports/jdbc-compare-summary.txt
